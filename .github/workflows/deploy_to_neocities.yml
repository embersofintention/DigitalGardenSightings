  name: Deploy to Neocities

  on:
    push:
      branches: ["main"]

  jobs:
    deploy:
      runs-on: ubuntu-22.04
      steps:
        - uses: actions/checkout@v4

        - name: Use Node.js 22.x
          uses: actions/setup-node@v4
          with:
            node-version: 22.x
            cache: "npm"

        - run: npm install
        - run: npm run build

        - name: Deploy to Neocities
          uses: bcomnes/deploy-to-neocities@v2
          with:
            api_token: ${{ secrets.NEOCITIES_API_TOKEN }}
            dist_dir: dist
            cleanup: false